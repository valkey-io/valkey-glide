apiVersion: v1
kind: Service
metadata:
  name: workers
  namespace: glide-repro
spec:
  clusterIP: None
  selector:
    app: worker
  ports:
    - name: tasks
      port: 9001
      targetPort: 9001
---
# 1 SET pod — writes keys that the DEL pods will delete
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: setter
  namespace: glide-repro
spec:
  serviceName: workers
  replicas: 1
  selector:
    matchLabels:
      app: worker
      role: setter
  template:
    metadata:
      labels:
        app: worker
        role: setter
    spec:
      containers:
        - name: worker
          image: 301403446842.dkr.ecr.us-east-2.amazonaws.com/glide-repro:diag-1773583752
          envFrom:
            - configMapRef:
                name: glide-repro-config
          env:
            - name: ROLE
              value: "worker"
            - name: COMMAND_TYPE
              value: "set"
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LISTEN_PORT
              value: "9001"
          ports:
            - containerPort: 9001
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - name: shared
              mountPath: /shared
      volumes:
        - name: shared
          emptyDir: {}
---
# 9 DEL pods — multi-slot DEL with 6 random keys (customer pattern)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: deleter
  namespace: glide-repro
spec:
  serviceName: workers
  replicas: 9
  selector:
    matchLabels:
      app: worker
      role: deleter
  template:
    metadata:
      labels:
        app: worker
        role: deleter
    spec:
      containers:
        - name: worker
          image: 301403446842.dkr.ecr.us-east-2.amazonaws.com/glide-repro:diag-1773583752
          envFrom:
            - configMapRef:
                name: glide-repro-config
          env:
            - name: ROLE
              value: "worker"
            - name: COMMAND_TYPE
              value: "del"
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LISTEN_PORT
              value: "9001"
          ports:
            - containerPort: 9001
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - name: shared
              mountPath: /shared
      volumes:
        - name: shared
          emptyDir: {}
